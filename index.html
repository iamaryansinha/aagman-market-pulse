<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aagman Pulse Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['JetBrains Mono', 'monospace'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            400: '#2dd4bf',
                            500: '#14b8a6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; }
        .terminal-row:hover { background-color: rgba(255, 255, 255, 0.03); }
        .terminal-row { border-bottom: 1px solid rgba(39, 39, 42, 0.4); }
        /* Line clamp for summary */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
<base target="_blank">
</head>
<body class="bg-[#09090b] text-zinc-300 font-mono antialiased min-h-screen flex flex-col w-full selection:bg-brand-500/30 selection:text-brand-100">

    <nav class="sticky top-0 z-50 bg-[#09090b] border-b border-zinc-800">
        <div class="max-w-full mx-auto px-4 h-12 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold tracking-wide text-zinc-100 uppercase">AAGMAN <span class="text-brand-400">PULSE TERMINAL</span></span>
                </div>
                <div class="hidden lg:flex items-center gap-6 text-[11px] font-bold uppercase tracking-wide text-zinc-500">
                    <a href="#" class="text-brand-400">Latest</a>
                    <a href="#" class="hover:text-zinc-100 transition-colors">Companies</a>
                    <a href="#" class="hover:text-zinc-100 transition-colors">Markets</a>
                    <a href="#" class="hover:text-zinc-100 transition-colors">Economy</a>
                    <a href="#" class="hover:text-zinc-100 transition-colors">Stocks</a>
                    <a href="#" class="hover:text-zinc-100 transition-colors">Commods</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-[11px] text-zinc-500 hidden sm:block" id="clock">MAR 26 14:42:05 GMT</div>
            </div>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-full mx-auto">
        
        <div class="px-4 py-4 bg-zinc-900/30 border-b border-zinc-800">
            <div class="flex items-center gap-3 text-xs">
                <span class="text-brand-400 font-bold">> AAGMAN_PULSE</span>
                <span class="text-zinc-600">|</span>
                <span class="text-zinc-400 truncate uppercase">THE PULSE OF INDIAN MARKETS & BUSINESS. UNFILTERED ANALYSIS. ZERO NOISE.</span>
            </div>
        </div>

        <!-- Desktop: Table Layout | Mobile: Card Layout -->
        <div class="w-full">
            
            <!-- Desktop Header (hidden on mobile) -->
            <div class="hidden md:flex items-center px-4 py-2 border-b border-zinc-700 bg-zinc-900/50 text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                <div class="w-28 shrink-0">Category</div>
                <div class="w-14 shrink-0">Time</div>
                <div class="flex-1 px-4">Headline & Summary</div>
                <div class="w-16 shrink-0 text-right">Read</div>
            </div>

            <!-- Articles Container -->
            <div class="flex flex-col" id="articles-container">
                <!-- Articles load here -->
            </div>
        </div>

        <div class="px-4 py-4 text-center border-t border-zinc-800">
            <div class="flex items-center justify-center gap-2 text-[11px] text-zinc-500">
                <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
                <span id="status-text">Loading updates...</span>
            </div>
        </div>

    </main>

    <footer class="border-t border-zinc-800 bg-[#09090b] h-10 shrink-0">
        <div class="max-w-full mx-auto px-4 h-full flex justify-between items-center text-[10px] text-zinc-600 uppercase tracking-wide">
            <div class="flex items-center gap-4">
                <span>Status: Connected</span>
                <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span> Feed: Realtime</span>
            </div>
            <div class="flex gap-6">
                <a href="#" class="hover:text-brand-400">Terms</a>
                <a href="#" class="hover:text-brand-400">Privacy</a>
                <span>Aagman © 2026</span>
            </div>
        </div>
    </footer>

    <!-- Auto-refresh every 4 hours -->
    <script>
        // Update clock
        function updateClock() {
            const now = new Date();
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const str = `${months[now.getMonth()]} ${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} GMT`;
            document.getElementById('clock').textContent = str;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Auto-refresh page every 4 hours
        setTimeout(function() {
            location.reload();
        }, 4 * 60 * 60 * 1000);

        // Category colors mapping
        const categoryColors = {
            'COMPANIES': 'text-blue-400',
            'MARKETS': 'text-emerald-400',
            'ECONOMY': 'text-purple-400',
            'STOCKS': 'text-teal-400',
            'COMMODS': 'text-orange-400'
        };

        // Fetch and display articles
        async function loadArticles() {
            try {
                const response = await fetch('data/articles.json');
                const articles = await response.json();
                
                const container = document.getElementById('articles-container');
                const statusText = document.getElementById('status-text');
                
                if (articles.length === 0) {
                    statusText.textContent = 'No articles yet. Check back soon.';
                    return;
                }
                
                container.innerHTML = articles.map(article => {
                    const colorClass = categoryColors[article.category] || 'text-zinc-400';
                    const timeDisplay = article.time && article.time !== 'undefined' ? article.time : '--:--';
                    
                    // Desktop: Table row | Mobile: Card
                    return `
                        <a href="articles/${article.slug}.html" class="terminal-row block md:flex md:items-center px-4 py-3 md:py-2.5 transition-colors group border-b border-zinc-800/50">
                            
                            <!-- Mobile: Top row with category, time, read time -->
                            <div class="flex items-center justify-between mb-2 md:hidden">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold ${colorClass}">${article.category}</span>
                                    <span class="text-[10px] text-zinc-500">${timeDisplay}</span>
                                </div>
                                <span class="text-[10px] text-zinc-500">${article.read_time}m</span>
                            </div>
                            
                            <!-- Desktop: Category column -->
                            <div class="hidden md:block w-28 shrink-0 text-[10px] font-mono font-bold ${colorClass}">${article.category}</div>
                            
                            <!-- Desktop: Time column -->
                            <div class="hidden md:block w-14 shrink-0 text-[11px] font-mono text-zinc-500">${timeDisplay}</div>
                            
                            <!-- Title & Summary (both mobile & desktop) -->
                            <div class="flex-1 md:px-4">
                                <div class="text-[14px] md:text-[13px] font-bold text-zinc-100 group-hover:text-brand-400 mb-1 md:mb-0 leading-tight">
                                    ${article.title}
                                </div>
                                <div class="text-[11px] md:text-[12px] text-zinc-500 line-clamp-2 md:truncate uppercase tracking-wide">
                                    ${article.summary}
                                </div>
                            </div>
                            
                            <!-- Desktop: Read time column -->
                            <div class="hidden md:block w-16 shrink-0 text-right text-[11px] font-mono text-zinc-500">${article.read_time}m</div>
                        </a>
                    `;
                }).join('');
                
                statusText.textContent = `${articles.length} updates loaded`;
                
            } catch (error) {
                console.error('Error loading articles:', error);
                document.getElementById('status-text').textContent = 'Error loading updates';
            }
        }

        // Load articles on page load
        loadArticles();
    </script>

</body>
</html>
